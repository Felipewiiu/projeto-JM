<mat-form-field class="input-container" appearance="outline">
  <mat-label>{{ label }}</mat-label>
  <mat-icon matPrefix>{{ iconePrefixo }}</mat-icon>
  <input matInput
        placeholder="Origem"
        [formControl]="control"
        [name]="label"
        ngDefaultControl
        [matAutocomplete]="auto">
  <mat-icon matSuffix>search</mat-icon>

  <mat-autocomplete #auto="matAutocomplete">
    <!-- aqui eu recebi um observable -->
    @for (option of filteredOptions$ | async; track option.id) {
      <mat-option [value]="option.nome">{{ option.nome }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>

<app-card variante="secundary">
  <form class="form-busca" [formGroup]="formBuscaService.formBusca">
    <h2>Passagens</h2>
    <div class="flex-container">
      <mat-button-toggle-group
        name="fontStyle"
        aria-label="Tipo de passagem"
        formControlName="somenteIda"
      >
        <mat-button-toggle value="bold" [value]="false"> IDA E VOLTA </mat-button-toggle>
        <mat-button-toggle value="italic" [value]="true">SOMENTE IDA</mat-button-toggle>
      </mat-button-toggle-group>
      <mat-chip-listbox aria-label="Seleção de passagem" (click)="formBuscaService.openDialog()">
        <mat-chip-option selected>1 adulto</mat-chip-option>
        <mat-chip-option>Econômica</mat-chip-option>
      </mat-chip-listbox>
    </div>

    <div class="flex-container">
      <app-dropdown-uf label="Origem" iconePrefixo="flight_takeoff"  [control]="formBuscaService.obterControle('origem')"></app-dropdown-uf>

      <button mat-icon-button>
        <mat-icon class="mat-18">sync_alt</mat-icon>
      </button>

      <app-dropdown-uf label="Destino" iconePrefixo="flight_land" [control]="formBuscaService.obterControle('destino')"></app-dropdown-uf>

      <mat-form-field class="input-container" appearance="outline">
        <mat-label>Data da ida</mat-label>
        <input matInput [matDatepicker]="ida" />
        <mat-datepicker-toggle matIconSuffix [for]="ida"></mat-datepicker-toggle>
        <mat-datepicker #ida></mat-datepicker>
      </mat-form-field>
      <mat-form-field class="input-container" appearance="outline">
        <mat-label>Data da volta</mat-label>
        <input matInput [matDatepicker]="volta" />
        <mat-datepicker-toggle matIconSuffix [for]="volta"></mat-datepicker-toggle>
        <mat-datepicker #volta></mat-datepicker>
      </mat-form-field>

      <button mat-flat-button color="primary" class="btn_buscar">BUSCAR</button>
    </div>
  </form>
</app-card>
